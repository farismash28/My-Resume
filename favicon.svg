<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <text
    x="3"
    y="24"
    font-family="monospace"
    font-size="21"
    font-weight="900"
    fill="#00f5ff"
    filter="url(#glow)"
  >&gt;_</text>
